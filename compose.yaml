services:
  hono_ms:
    build: 
      context: ./Atomics/Card
      dockerfile: Hono.Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - ./Atomics/Card/.env.docker
  
  postgres:
    image: postgres:latest
    ports:
      - 5432:5432
    volumes:
      - ~/apps/postgres:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres